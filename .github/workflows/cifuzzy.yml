# AMC - Continuous Fuzzing
# ClusterFuzzLite workflow for automated security testing
#
# This workflow uses Google's ClusterFuzzLite to continuously fuzz test
# the codebase for vulnerabilities, crashes, and edge cases.
#
# Fuzzing Targets:
#   - Input validation functions
#   - Data parsers and sanitizers
#   - File format handlers
#
# Duration: 600 seconds per run
# Sanitizer: AddressSanitizer for memory safety
# Reporting: SARIF format uploaded to Security tab
name: Continuous Fuzzing

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write  # For SARIF upload

jobs:
  fuzzing:
    name: ClusterFuzzLite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address]

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for fuzz targets
        id: check-fuzz
        run: |
          if [ -d "fuzz" ] && [ -n "$(find fuzz -name '*.py' -type f 2>/dev/null)" ]; then
            echo "has-targets=true" >> $GITHUB_OUTPUT
          else
            echo "has-targets=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No fuzz targets found in fuzz/ directory. Skipping fuzzing." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build Fuzzers
        if: steps.check-fuzz.outputs.has-targets == 'true'
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: python
          sanitizer: ${{  matrix.sanitizer  }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Fuzzers
        if: steps.check-fuzz.outputs.has-targets == 'true'
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{  secrets.GITHUB_TOKEN  }}
          fuzz-seconds: 600
          mode: 'code-change'
          sanitizer: ${{  matrix.sanitizer  }}
          output-sarif: true

      - name: Upload SARIF
        if: always() && steps.check-fuzz.outputs.has-targets == 'true'
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: results.sarif
          category: fuzzing-${{  matrix.sanitizer  }}

      - name: Upload Crash Artifacts
        if: failure() && steps.check-fuzz.outputs.has-targets == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzzing-crashes-${{  matrix.sanitizer  }}
          path: build/out/
          retention-days: 7

      - name: Fuzzing Summary
        if: always()
        run: |
          echo "## Fuzzing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Sanitizer**: ${{  matrix.sanitizer  }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration**: 600 seconds" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status**: ${{  steps.build.outcome  }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Status**: ${{  steps.run.outcome  }}" >> $GITHUB_STEP_SUMMARY
