name: "CodeQL configuration for AMC"

# Include standard security and quality queries.
queries:
  - uses: security-extended
  - uses: security-and-quality

# Suppress py/undefined-name: SQLAlchemy 2.x uses TYPE_CHECKING guards for
# forward-reference type hints to avoid circular imports. With
# `from __future__ import annotations` (PEP 563), all annotations are strings
# that are never evaluated at runtime, so these imports are safe. CodeQL does
# not fully model PEP 563 deferred evaluation and reports false positives.
# Ruff covers undefined-name detection for non-annotation code.
query-filters:
  - exclude:
      id: py/undefined-name
